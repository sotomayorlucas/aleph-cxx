\* TLC config — verifica que las 4 reglas DPO preservan las 10
\* invariantes sobre la fixture. Bounds más generosos que scene_graph
\* porque las reglas agregan nodos/edges; MaxOps bounds trace length.
SPECIFICATION DpoSpec

CONSTANTS
    NodesMax = 12
    EdgesMax = 24
    MaxDegree = 10
    MaxOps   = 3

INVARIANTS
    TypedNodes
    TypedEdges
    EdgeEndpointsExist
    EdgeTypeCompatInv
    TransformAcyclic
    CameraExclusive
    MaterialReferenced
    UniqueIds
    ContainsAntireflexive
    BoundedDegree
    Invariants
    AdjacentIsAntisymmetric
    AdjacentMeshesShareMaterial
    DimensionsAreNonNegative

\* Symmetry reduction: TLA+ doesn't auto-do this; we keep the rule space
\* small (4 rules, fixed fixture) so blowup should stay tractable.
\* If TLC blows up on refine_cell, bump CHECK_DEADLOCK off and reduce
\* NodesMax/EdgesMax — refine adds 2 nodes + 3 edges each fire.
CHECK_DEADLOCK FALSE
