\* TLC config — well-formedness of the fixture scene under stuttering.
SPECIFICATION Spec

\* Fixture uses exactly 8 nodes / 8 edges; tight bounds keep TLC fast.
CONSTANTS
    NodesMax = 8
    EdgesMax = 12
    MaxDegree = 8
    MaxOps = 0

INVARIANTS
    TypedNodes
    TypedEdges
    EdgeEndpointsExist
    EdgeTypeCompatInv
    TransformAcyclic
    CameraExclusive
    MaterialReferenced
    UniqueIds
    ContainsAntireflexive
    BoundedDegree
    Invariants
